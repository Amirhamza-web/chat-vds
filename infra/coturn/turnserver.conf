# coturn TURN/STUN server config. Used by Phase 2 (voice/video).
# Enable with: docker compose --profile voice up -d coturn

listening-port=3478
fingerprint
lt-cred-mech

# Replace with strong credentials in .env.
user=chatvds:CHANGE_ME

# realm should match your domain (replace before deploy).
realm=chat-vds.local

# UDP relay range (must be opened in firewall).
min-port=49152
max-port=65535

# Recommended logging.
verbose
no-stdout-log
log-file=stdout

# Security hardening.
no-loopback-peers
no-multicast-peers
no-tlsv1
no-tlsv1_1
