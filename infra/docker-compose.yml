name: chat-vds

services:
  # ─────────── shared infrastructure ───────────
  # Ports are bound to 127.0.0.1 so they're available for `pnpm dev` on the
  # host but not exposed publicly on a VDS. Set `DB_BIND_HOST=0.0.0.0` (etc.)
  # in `.env` only if you need remote access.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatvds}
      POSTGRES_USER: ${POSTGRES_USER:-chatvds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatvds}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '${DB_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chatvds}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    ports:
      - '${DB_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '${DB_BIND_HOST:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000'
      - '${DB_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatvds}:${POSTGRES_PASSWORD:-chatvds}@postgres:5432/${POSTGRES_DB:-chatvds}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 30
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost}
      PUBLIC_BASE_URL: ${API_PUBLIC_URL:-http://localhost:3001}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /data/uploads
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-chat-vds}
      MINIO_USE_SSL: 'false'
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
    volumes:
      - api_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${API_PUBLIC_URL:-http://localhost:3001}
        VITE_SFU_URL: ${SFU_PUBLIC_URL:-${API_PUBLIC_URL:-http://localhost:3001}}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-internal@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  # ─────────── Phase 2: voice/video ───────────
  # SFU uses the bridge network so it can reach `postgres` / `redis` by service
  # name. The mediasoup RTP port range (default 40000-40100/udp+tcp) is
  # exposed on the host so WebRTC traffic flows directly from clients to the
  # SFU. MEDIASOUP_ANNOUNCED_IP MUST be set to the VDS public IPv4.
  sfu:
    build:
      context: ..
      dockerfile: apps/sfu/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatvds}:${POSTGRES_PASSWORD:-chatvds}@postgres:5432/${POSTGRES_DB:-chatvds}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP}
      MEDIASOUP_RTC_MIN_PORT: ${MEDIASOUP_RTC_MIN_PORT:-40000}
      MEDIASOUP_RTC_MAX_PORT: ${MEDIASOUP_RTC_MAX_PORT:-40100}
    ports:
      - '${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/udp'
      - '${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/tcp'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - voice

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --no-stdout-log
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --user=${COTURN_USER:-chatvds}:${COTURN_PASSWORD:-chatvds}
      - --realm=${COTURN_REALM:-chat-vds.local}
      - --min-port=49152
      - --max-port=65535
      - --no-loopback-peers
      - --no-multicast-peers
      - --no-tlsv1
      - --no-tlsv1_1
    profiles:
      - voice

volumes:
  pg_data:
  redis_data:
  minio_data:
  api_uploads:
  caddy_data:
  caddy_config:
